name: DM - Terminologie de référence (TRE)
description: Nomenclatures des Objets de Santé (NOS) Demande de modification d'une terminologie de référence (TRE).
title: "DM-"
labels: ["DM-TRE"]
body:
  - type: markdown
    attributes:
      value: "# Initialisation"
  - type: input
    id: Demandeur
    attributes:
      label: Système demandeur
    validations:
      required: true
  - type: input
    id: DateGen
    attributes:
      label: Date de génération souhaitée
      placeholder: MM/AAAA
    validations:
      required: true
  - type: textarea
    id: Contexte
    attributes:
      label: Contexte
      description: Veuillez renseigner une description ainsi que le cadre juridique
    validations:
      required: true
  - type: input
    id: Nom
    attributes:
      label: Terminologie de référence à modifier
      placeholder:  Nom ou URL de la TRE
    validations:
      required: true
  - type: markdown
    attributes:
      value: "# Description des modifications demandées" 
  - type: textarea
    id: Description
    attributes:
      label: Dans le cas de la mise à jour de la description de la TRE, veuillez indiquer la nouvelle description.
      description: La description de la nomenclature doit contenir au maximum 250 caractères.
    validations:
      required: false
  - type: textarea
    id: TRE
    attributes:
      label: Dans le cas de la modification du contenu de la TRE, veuillez indiquer les lignes mises à jour.
      description: |
        **Veuillez lister les lignes mises à jour selon le format ci-dessous ou joindre un fichier excel en suivant le modèle [DM_TerminologieDeReference](https://github.com/ansforge/IG-terminologie-de-sante/raw/refs/heads/main/input/DM_Excel/DM_TerminologieDeReference.xlsx).**
        
        Données attendues : 
        - Code ; Libellé ; Type de modication demandée (Ajout, Modification, Obsolescence, Réactivation) ; Description métier (facultative) ; Synonyme 1 (facultatif) ; Synonyme 2 (facultatif) ; ...
      placeholder: |
        Exemple TRE_R314_TypeCreneau :
        - SNP ; Créneau accessible par les Régulateurs et Organisateurs de Soins Non Programmés ; A ; Les créneaux ouverts aux Soins Non Programmés -Créneau de soins défini par un professionnel de santé ou son délégataire dans son logiciel de prise de RDV accessible par les Régulateurs et Organisateurs de Soins Non Programmés
    validations:
      required: false   
  - type: textarea
    id: JDVimpact
    attributes:
      label: Les impacts sont à renseigner par l'équipe NOS et sont sous leur responsabilité, tout en restant ouverts à l'auteur de la DM.
    validations:
      required: false 
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > **Les modifications de libellés sont toujours reportées automatiquement dans les jeux de valeurs, ceci afin d'éviter un déphasage avec la TRE source et donc des remontées d'erreurs.**
        > **Les ajouts/mises en obsolescence de codes seront automatiquement reportés dans les jeux de valeurs ayant une règle de mise à jour le spécifiant.** 
