name: DM - Création/Modification - Nomenclature
description: "Nomenclatures des Objets de Santé (NOS) Demande de création/modification d'une nomenclature."
title: "Création/Modification"
labels: ["Création/Modification"]
body:
  - type: markdown
    attributes:
      value: "# Initialisation"
  - type: input
    id: Demandeur
    attributes:
      label: Système demandeur
    validations:
      required: true
  - type: input
    id: DateGen
    attributes:
      label: Date de génération souhaitée
      placeholder: MM/AAAA
    validations:
      required: true
  - type: textarea
    id: Contexte
    attributes:
      label: Contexte
      description: Veuillez renseigner une description ainsi que le cadre juridique
    validations:
      required: true
  - type: dropdown
    id: consommateur
    attributes:
      label: Consommateur(s) impacté(s)
      multiple: true 
      description: Sélectionnez le(s) consommateur(s) impacté(s) par la nomenclature.
      options:
      - ROR
      - CI-SIS
      - RPPS
      - FINESS
      - RASS
      - ENREG
      - EPARS
      - MOS
      - DMP
      - SI-CPS
      - MSS
      - SAMU
      - DICO
      - SI-VIC
      - Interop'Santé
      - Santefr
      - CNSA
      - ENS
      - SAS
      - RFOS
      - Autre(s)
    validations:
      required: false
  - type: input
    id: AutreConso
    attributes:
      label: Autre(s)
      description: Si un consommateur impacté n'est pas présent dans la liste ci-dessus, veuillez le préciser ici
    validations:
      required: false
  - type: markdown
    attributes:
      value: "# Nomenclature à Créer/Modifier"
  - type: input
    id: Nom
    attributes:
      label: Nom
      description: A renseigné si création d'une nouvelle nomenclature. Il ne doit contenir ni caractères accentués ni espaces ni caractères spéciaux excepté "_". <br> **Privilégiez la convention de nommage PascalCase.*
    validations:
      required: false
  - type: input
    id: Description
    attributes:
      label: Description
      description: A renseigné si création d'une nouvelle nomenclature ou modification de la description. <br> **La description de la nomenclature doit contenir au maximum 250 caractères.*
    validations:
      required: false
  - type: textarea
    id: Contenu
    attributes:
      label: Contenu à Ajouter/Modifier
      description: |
        **Veuillez lister les lignes mises à jour selon le format ci-dessous ou joindre un fichier excel en suivant le modèle [](../tree/main/input/DM_Excel/).**
        
        Données attendues : 
        - TRE: OID; Code ; Libellé ; Type de modication demandée (Ajout, Modification, Obsolescence, Réactivation) ; Description métier (facultative) ; Synonyme 1 (facultatif) ; Synonyme 2 (facultatif) ; ...
        - JDV: OID de la TRE source; Code ; libellé ; Type de modication demandée (Ajout, Modification, Obsolescence)
      placeholder: |
        Exemple TRE_R314_TypeCreneau :
        - SNP ; Créneau accessible par les Régulateurs et Organisateurs de Soins Non Programmés ; A ; Les créneaux ouverts aux Soins Non Programmés -Créneau de soins défini par un professionnel de santé ou son délégataire dans son logiciel de prise de RDV accessible par les Régulateurs et Organisateurs de Soins Non Programmés
    validations:
      required: false
  - type: textarea
    id: JDVimpact
    attributes:
      label: Si les modifications d'une TRE impactent un JDV, veuillez indiquer leurs noms.
    validations:
      required: false 
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > **Le jeu de valeurs reprenant l'intégralité des codes de la TRE sera automatiquement mis à jour.** 
