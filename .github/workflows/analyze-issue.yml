name: Pré-analyse terminologique

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Numéro de l'issue à analyser"
        required: true
        type: string

jobs:
  analyze:
    runs-on: ubuntu-latest
    # Limiter aux issues terminologiques (sauf déclenchement manuel)

    permissions:
      issues: write
      contents: write  # pour sauvegarder l'analyse dans le repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Pré-analyse de l'issue
        env:
          ALBERT_API_KEY: ${{ secrets.ALBERT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/issue/analyze_issue.py \
            --repo "${{ github.repository }}" \
            --issue-number "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number || github.event.issue.number }}" \
            --model "mistralai/Mistral-Small-3.2-24B-Instruct-2506" \
            --collection-id 156723
