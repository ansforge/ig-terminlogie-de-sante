name: DM - Création/Modification - Nomenclature
description: "Nomenclatures des Objets de Santé (NOS) Demande de création/modification d'une nomenclature."
title: "Création/Modification"
labels: ["Création/Modification"]
body:
  - type: markdown
    attributes:
      value: "# Initialisation"
  - type: input
    id: Demandeur
    attributes:
      label: Système demandeur
    validations:
      required: true
  - type: input
    id: DateGen
    attributes:
      label: Date de génération souhaitée
      placeholder: MM/AAAA
    validations:
      required: true
  - type: textarea
    id: Contexte
    attributes:
      label: Contexte
      description: Veuillez renseigner une description ainsi que le cadre juridique
    validations:
      required: true
  - type: dropdown
    id: consommateur
    attributes:
      label: Consommateur(s) impacté(s)
      multiple: true 
      description: Sélectionnez le(s) consommateur(s) impacté(s) par la nomenclature.
      options:
      - ROR
      - CI-SIS
      - RPPS
      - FINESS
      - RASS
      - ENREG
      - EPARS
      - MOS
      - DMP
      - SI-CPS
      - MSS
      - SAMU
      - DICO
      - SI-VIC
      - Interop'Santé
      - Santefr
      - CNSA
      - ENS
      - SAS
      - RFOS
      - Autre(s)
    validations:
      required: false
  - type: input
    id: AutreConso
    attributes:
      label: Autre(s)
      description: Si un consommateur impacté n'est pas présent dans la liste ci-dessus, veuillez le préciser ici
    validations:
      required: false
  - type: markdown
    attributes:
      value: "# Nomenclature à Créer/Modifier"
  - type: input
    id: Nom
    attributes:
      label: Nom
      description: Lors de la création, le nom doit contenir ni caractères accentués ni espaces ni caractères spéciaux excepté "_". <br> **Privilégiez la convention de nommage PascalCase.*
    validations:
      required: true
  - type: input
    id: Description
    attributes:
      label: Description
      description: A renseigner s'il s'agit d'une création de nouvelle nomenclature ou modification de la description d'une nomenclature existante. <br> **La description de la nomenclature doit contenir au maximum 250 caractères.*
    validations:
      required: false
  - type: textarea
    id: Contenu
    attributes:
      label: Contenu à Ajouter/Modifier
      description: |
        **Veuillez lister les lignes mises à jour selon le format ci-dessous : **
        
        Données attendues : 
        - TRE: OID; Code ; Libellé ; Type de modication demandée (Ajout, Modification, Obsolescence, Réactivation) ; Description métier (facultative) ; Synonyme 1 (facultatif) ; Synonyme 2 (facultatif) ; ...
        - JDV: OID de la TRE source; Code ; libellé ; Type de modication demandée (Ajout, Modification, Obsolescence)
        - ASS : Code & code system de la TRE source ; Type d'association ; code & code system de la TRE cible ;  Commentaire ; Type de modification (Ajout, Suppression)
      placeholder: |
        Exemple pour la TRE_R314_TypeCreneau :
        - 1.2.250.1.213.3.3.71 ; SNP ; Créneau accessible par les Régulateurs et Organisateurs de Soins Non Programmés ; A ; Les créneaux ouverts aux Soins Non Programmés -Créneau de soins défini par un professionnel de santé ou son délégataire dans son logiciel de prise de RDV accessible par les Régulateurs et Organisateurs de Soins Non Programmés
        Exemple pour le JDV_J165_TypeCreneau-SAS :
        - 1.2.250.1.213.3.3.71 ; SNP ; Créneau accessible par les Régulateurs et Organisateurs de Soins Non Programmés
        Exemple pour l'ASS_A11-CorresModeleCDA-XdsFormatCode-CISIS :
        - 1.2.250.1.213.1.1.1.5.3 & 1.2.250.1.213.1.1.4.328 ; equivalent ; urn:asip:ci-sis:cse-cs24:2017 & 1.2.250.1.213.1.1.4.2.282 ; ; Ajout
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        > [!NOTE]
        > **Dans le cas où plusieurs nomenclatures sont à créer, modifier ou rendre obsolètes, nous vous recommandons plutôt de renseigner les informations dans un fichier excel suivant le modèle [Template_DM](../tree/Nouveau_Template_Issue_Brouillon/input/DM_Excel/DM_Template.xlsx).**
  - type: textarea
    id: JDVimpact
    attributes:
      label: Si les modifications d'une TRE impactent un ou plusieurs autres JDV, veuillez indiquer leurs noms.
    validations:
      required: false  
    - type: textarea
    id: maj
    attributes:
      label: Règle de mise à jour du jeu de valeurs
      description :  Dans le cas d'une création d'un nouveau JDV ou d'un changement pour un JDV existant, veuillez indiquer la nouvelle règle de mise à jour du JDV
      placeholder : "Par exemple : A l'image des TRE - sur code actif seulement..."
    validations:
      required: false